# .github/workflows/release_cedeao.yml
# ============================================================
#  Release CEDEAO — Build multi-pays en une seule passe
#  Génère un APK par pays avec la bonne config (devise, langue)
#  Pays ciblés : Sénégal, Mali, Côte d'Ivoire, Guinée, Bénin
# ============================================================
#
#  SECRETS REQUIS : mêmes que release_android.yml
#  (KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD,
#   SUPABASE_URL, SUPABASE_ANON_KEY)

name: Release CEDEAO (Multi-pays)

on:
  workflow_dispatch:
    inputs:
      countries:
        description: 'Pays à builder (virgule séparés ou "all")'
        required: true
        default: 'all'
        type: string

jobs:
  build:
    name: Build ${{ matrix.country.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false   # Continue les autres pays si l'un échoue
      matrix:
        country:
          - name: Senegal
            code: SN
            locale: fr_SN
            currency: FCFA
            flavor: senegal
          - name: Mali
            code: ML
            locale: fr_ML
            currency: FCFA
            flavor: mali
          - name: Cote_dIvoire
            code: CI
            locale: fr_CI
            currency: FCFA
            flavor: cote_divoire
          - name: Guinee
            code: GN
            locale: fr_GN
            currency: GNF
            flavor: guinee
          - name: Benin
            code: BJ
            locale: fr_BJ
            currency: FCFA
            flavor: benin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Installer les dépendances
        run: flutter pub get

      - name: Injecter la config pays (AVANT build_runner)
        run: |
          cat > lib/core/constants/supabase_config.dart << EOF
          class SupabaseConfig {
            static const supabaseUrl = '${{ secrets.SUPABASE_URL }}';
            static const supabaseAnonKey = '${{ secrets.SUPABASE_ANON_KEY }}';
            // Config pays injectée par CI
            static const countryCode = '${{ matrix.country.code }}';
            static const defaultLocale = '${{ matrix.country.locale }}';
            static const defaultCurrency = '${{ matrix.country.currency }}';
          }
          EOF

      - name: Générer les fichiers Drift
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Décoder le keystore
        run: |
          echo -n "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/gpos.jks
          printf "storePassword=${{ secrets.KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.KEY_PASSWORD }}\nkeyAlias=${{ secrets.KEY_ALIAS }}\nstoreFile=gpos.jks" > android/key.properties

      - name: Extraire la version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1)
          BUILD=$(grep '^version:' pubspec.yaml | cut -d'+' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT

      - name: Build APK ${{ matrix.country.name }}
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build }}

      - name: Renommer l'APK avec le pays
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/gpos-${{ matrix.country.code }}-${{ steps.version.outputs.version }}.apk

      - name: Upload APK ${{ matrix.country.name }}
        uses: actions/upload-artifact@v4
        with:
          name: gpos-${{ matrix.country.code }}-${{ steps.version.outputs.version }}
          path: build/app/outputs/flutter-apk/gpos-${{ matrix.country.code }}-*.apk
          if-no-files-found: error

      - name: Nettoyage
        if: always()
        run: |
          rm -f android/app/gpos.jks android/key.properties
          rm -f lib/core/constants/supabase_config.dart
