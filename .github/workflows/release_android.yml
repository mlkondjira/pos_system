# .github/workflows/release_android.yml
# ============================================================
#  Release Android — APK signé + AAB (Play Store)
#  Se déclenche sur : tag v* ou manuellement
# ============================================================
#
#  SECRETS REQUIS (GitHub → Settings → Secrets → Actions) :
#  ┌─────────────────────────────┬────────────────────────────────────────────┐
#  │ Secret                      │ Comment l'obtenir                          │
#  ├─────────────────────────────┼────────────────────────────────────────────┤
#  │ KEYSTORE_BASE64             │ base64 -w 0 gpos.jks > keystore_b64.txt   │
#  │ KEYSTORE_PASSWORD           │ Mot de passe du keystore                   │
#  │ KEY_ALIAS                   │ Alias de la clé (ex: gpos-key)             │
#  │ KEY_PASSWORD                │ Mot de passe de la clé                     │
#  │ SUPABASE_URL                │ https://xxxx.supabase.co                   │
#  │ SUPABASE_ANON_KEY           │ eyJhbGci... (clé anon Supabase)            │
#  └─────────────────────────────┴────────────────────────────────────────────┘

name: Release Android

on:
  push:
    tags:
      - 'v*'        # Ex: v1.0.2, v2.0.0
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type de build'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk       # APK direct (distribution manuelle)
          - aab       # AAB pour le Play Store
          - both      # Les deux

jobs:
  build_android:
    name: Build Android ${{ github.event.inputs.build_type || 'apk' }}
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      # ── 3. Flutter stable ──────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 4. Dépendances ─────────────────────────────────────
      - name: Installer les dépendances
        run: flutter pub get

      # ── 5. Injecter les secrets Supabase (AVANT build_runner) ──
      - name: Injecter les clés Supabase
        run: |
          cat > lib/core/constants/supabase_config.dart << EOF
          class SupabaseConfig {
            static const supabaseUrl = '${{ secrets.SUPABASE_URL }}';
            static const supabaseAnonKey = '${{ secrets.SUPABASE_ANON_KEY }}';
          }
          EOF

      # ── 6. Génération Drift ────────────────────────────────
      - name: Générer les fichiers Drift
        run: dart run build_runner build --delete-conflicting-outputs

      # ── 7. Keystore Android ────────────────────────────────
      - name: Décoder le keystore
        run: |
          echo -n "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/gpos.jks
          printf "storePassword=${{ secrets.KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.KEY_PASSWORD }}\nkeyAlias=${{ secrets.KEY_ALIAS }}\nstoreFile=gpos.jks" > android/key.properties

      # ── 8. Extraire la version du tag ──────────────────────
      - name: Extraire la version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"   # Supprimer le 'v' initial
          else
            VERSION=$(grep '^version:' pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1)
          fi
          BUILD_NUMBER=$(grep '^version:' pubspec.yaml | cut -d'+' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Version: $VERSION+$BUILD_NUMBER"

      # ── 9. Build APK signé ─────────────────────────────────
      - name: Build APK release
        if: ${{ github.event.inputs.build_type != 'aab' }}
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build_number }}

      # ── 10. Build AAB (Play Store) ─────────────────────────
      - name: Build AAB release
        if: ${{ github.event.inputs.build_type == 'aab' || github.event.inputs.build_type == 'both' }}
        run: |
          flutter build appbundle --release \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build_number }}

      # ── 11. Upload APK ────────────────────────────────────
      - name: Upload APK
        if: ${{ github.event.inputs.build_type != 'aab' }}
        uses: actions/upload-artifact@v4
        with:
          name: gpos-android-${{ steps.version.outputs.version }}-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      # ── 12. Upload AAB ────────────────────────────────────
      - name: Upload AAB
        if: ${{ github.event.inputs.build_type == 'aab' || github.event.inputs.build_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: gpos-android-${{ steps.version.outputs.version }}-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      # ── 13. Créer une GitHub Release automatique ──────────
      - name: Créer GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "GPOS ${{ github.ref_name }}"
          body: |
            ## GPOS ${{ github.ref_name }}

            ### Téléchargements
            - **APK Android** : Télécharger ci-dessous
            - **Windows MSIX** : Voir le workflow release_windows

            ### Installation Android
            1. Télécharger le fichier `.apk`
            2. Activer "Sources inconnues" dans les paramètres
            3. Installer le fichier

            ---
            *Build automatique via GitHub Actions*
          files: |
            build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 14. Nettoyage des secrets ─────────────────────────
      - name: Supprimer les fichiers sensibles
        if: always()
        run: |
          rm -f android/app/gpos.jks
          rm -f android/key.properties
          rm -f lib/core/constants/supabase_config.dart
