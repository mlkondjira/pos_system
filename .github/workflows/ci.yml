# .github/workflows/ci.yml
# ============================================================
#  CI — Tests automatiques sur chaque push et Pull Request
#  Se déclenche sur : push vers main/develop + toute PR
# ============================================================

name: CI — Tests & Analyse

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ── JOB 1 : Tests unitaires ─────────────────────────────────
  test:
    name: Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Installer les dépendances
        run: flutter pub get

      - name: Générer les fichiers Drift
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Créer supabase_config.dart (CI sans vraies clés)
        run: |
          cat > lib/core/constants/supabase_config.dart << 'EOF'
          class SupabaseConfig {
            static const supabaseUrl = 'https://placeholder.supabase.co';
            static const supabaseAnonKey = 'placeholder_anon_key';
          }
          EOF

      - name: Lancer les tests unitaires
        run: flutter test test/unit/ --reporter=github

      - name: Analyser le code
        run: flutter analyze --no-fatal-infos

      - name: Vérifier le formatage
        run: dart format --output=none --set-exit-if-changed lib/

  # ── JOB 2 : Vérification build Android ──────────────────────
  build-check-android:
    name: Vérification build Android
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Installer les dépendances
        run: flutter pub get

      - name: Générer les fichiers Drift
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Créer supabase_config.dart (CI)
        run: |
          cat > lib/core/constants/supabase_config.dart << 'EOF'
          class SupabaseConfig {
            static const supabaseUrl = 'https://placeholder.supabase.co';
            static const supabaseAnonKey = 'placeholder_anon_key';
          }
          EOF

      - name: Vérifier que le build Android compile
        run: flutter build apk --debug
